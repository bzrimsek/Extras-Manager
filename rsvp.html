<!--
CHANGELOG
v1.3  2026-05-27 8:38 AM EDT  Bug fix + security.
  Fix:  fetchWT() was called but never defined — caused Unavailable error on load.
  Fix:  Version footer positioned below card (flex-direction:column on card-wrap).
  Fix:  CSP meta tag added.
  Fix:  esc() applied to player names in option elements and success card.
  Add:  fetchWT() timeout wrapper on all Firebase fetch calls.

v1.2  2026-05-26  RSVP write fix.
  Fix:  Replaced PATCH with read-modify-write PUT so writeKey rides in payload.
  Add:  fetchWT() added for fetch timeout handling.
  Add:  Version display in footer from ?v= URL param.

v1.1  2026-05-25  Initial self-service RSVP page.
  Add:  Player select, in/out/maybe buttons, HCP + GHIN update, pizza reminder.
  Add:  Expiry at 6pm on game day.
  Add:  Tally display.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://bzs-golf-apps-default-rtdb.firebaseio.com https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data:;">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Extras Manager — RSVP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#1a2f1a;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;padding:20px}
  .card{background:#f4f4f2;border-radius:16px;padding:28px 24px;max-width:400px;width:100%}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#1a2f1a;letter-spacing:2px;margin-bottom:4px}
  .subtitle{font-size:13px;color:#4a6741;margin-bottom:20px}
  .date-badge{background:#1a2f1a;color:#c9a227;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;padding:6px 14px;border-radius:20px;display:inline-block;margin-bottom:20px}
  label{font-size:12px;font-weight:600;color:#4a6741;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
  select,input[type=number]{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #ccc;font-size:15px;font-family:'DM Sans',sans-serif;color:#1a2f1a;background:#fff;margin-bottom:18px;appearance:none}
  select:focus,input:focus{outline:none;border-color:#c9a227}
  .btn-row{display:flex;gap:10px;margin-bottom:4px}
  .btn{flex:1;padding:14px;border-radius:10px;border:2px solid #ccc;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;background:#fff;color:#1a2f1a}
  .btn-in {border-color:#ccc}
  .btn-out{border-color:#ccc}
  .btn-in:active,.btn-out:active{opacity:.7;transform:scale(.97)}
  .btn-save{width:100%;padding:16px;border-radius:12px;border:none;background:#c9a227;color:#1a2f1a;font-size:17px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 2px 8px rgba(201,162,39,.4)}
  .btn-save:active{opacity:.8;transform:scale(.98)}
  .status{text-align:center;font-size:14px;color:#4a6741;margin-top:14px;display:none}
  .expired{text-align:center;padding:20px 0}
  .expired-icon{font-size:48px;margin-bottom:12px}
  .expired-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#1a2f1a;letter-spacing:1px;margin-bottom:6px}
  .expired-msg{font-size:13px;color:#4a6741}
  .selected-in   {background:#166534;color:#fff;border:2px solid #166534;box-shadow:0 0 0 3px rgba(22,101,52,.2);transform:scale(1.04)}
  .selected-out  {background:#b91c1c;color:#fff;border:2px solid #b91c1c;box-shadow:0 0 0 3px rgba(185,28,28,.2);transform:scale(1.04)}
  .btn-maybe     {background:#fff;color:#999;border:1px dashed #bbb;font-size:13px}
  .selected-maybe{background:#92400e;color:#fff;border:2px solid #92400e;font-size:13px;transform:scale(1.02)}
  .hcp-row{margin-bottom:6px}
  .hcp-hint{font-size:11px;color:#888;margin-top:-12px;margin-bottom:18px}
  .loading{text-align:center;padding:20px 0;color:#4a6741;font-size:14px}
  .pizza-box{background:#7f3d00;border-radius:10px;padding:12px;margin-bottom:16px;display:none}
  .pizza-title{font-size:13px;font-weight:700;color:#fbbf24;margin-bottom:4px}
  .pizza-msg{font-size:13px;color:#fef3c7;line-height:1.4}
  .success{text-align:center;padding:10px 0}
  .success-icon{font-size:40px;margin-bottom:8px}
  .success-msg{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#1a2f1a;letter-spacing:1px}
  .success-sub{font-size:13px;color:#4a6741;margin-top:4px}
  .close-btn{position:absolute;top:-12px;right:-12px;width:30px;height:30px;border-radius:50%;background:#c9a227;border:none;color:#1a2f1a;font-size:16px;font-weight:700;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
  .card-wrap{position:relative;max-width:400px;width:100%;display:flex;flex-direction:column;align-items:center;}
  .tally{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
  .tally-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.3px}
  .tally-in   {background:#166534;color:#86efac}
  .tally-out  {background:#7f1d1d;color:#f87171}
  .tally-maybe{background:#44403c;color:#d6d3d1}
  .tally-unk  {background:#78350f;color:#fcd34d}
</style>
</head>
<body>
<div class="card-wrap">
  <div style="position:relative;width:100%;">
    <div class="card" id="card">
      <div class="loading">Loading…</div>
    </div>
    <button class="close-btn" onclick="history.length>1?history.back():window.close()" title="Close">✕</button>
  </div>
</div>

<script>
const FB_BASE      = 'https://bzs-golf-apps-default-rtdb.firebaseio.com';
const RSVP_VERSION = '1.3';
const RSVP_BUILD   = '2026-05-27 8:39 AM EDT';
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

async function fetchWT(url, options = {}, ms = 10000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, {...options, signal: ctrl.signal});
    clearTimeout(t); return r;
  } catch(e) { clearTimeout(t); throw e; }
}

// Parse URL params
const params  = new URLSearchParams(location.search);
const league  = params.get('l') || 'wed';
const dateStr = params.get('d') || '';   // YYYY-MM-DD

// Check expiry — link dies at 6pm on the evening date
function isExpired() {
  if (!dateStr) return false;
  // Use local time explicitly to avoid timezone issues
  const [y, m, d] = dateStr.split('-').map(Number);
  const cutoff = new Date(y, m - 1, d, 18, 0, 0); // 6pm local time on game day
  return new Date() > cutoff;
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
}

let players = [];
let state = null;
let selectedStatus = null;

async function init() {
  const card = document.getElementById('card');

  if (isExpired()) {
    card.innerHTML = `
      <div class="logo">Extras Manager</div>
      <div class="expired">
        <div class="expired-icon">⏰</div>
        <div class="expired-title">Link Expired</div>
        <div class="expired-msg">This RSVP link expired at 6pm on ${formatDate(dateStr)}.<br>Contact your league manager if you need to update your status.</div>
      </div>`;
    return;
  }

  // Load state from Firebase
  try {
    const resp  = await fetchWT(`${FB_BASE}/state.json`);
    state = await resp.json();
    const lg    = state && state.leagues && state.leagues[league];
    if (!lg || !Array.isArray(lg.players)) throw new Error('No players');
    players = lg.players.sort((a,b) => a.name.localeCompare(b.name));
  } catch(e) {
    card.innerHTML = `<div class="logo">Extras Manager</div><div class="expired"><div class="expired-icon">⚠️</div><div class="expired-title">Unavailable</div><div class="expired-msg">Could not load league data. Try again in a moment.</div></div>`;
    return;
  }

  renderForm();
}

function buildTally() {
  if (!state || !players.length) return '';
  const rsvpPlayers = state.leagues?.[league]?.rsvp?.players || {};
  const inC   = players.filter(p => rsvpPlayers[p.id] === 'in').length;
  const outC  = players.filter(p => rsvpPlayers[p.id] === 'out').length;
  const mayC  = players.filter(p => rsvpPlayers[p.id] === 'maybe').length;
  const unkC  = players.filter(p => !rsvpPlayers[p.id] || (rsvpPlayers[p.id] !== 'in' && rsvpPlayers[p.id] !== 'out' && rsvpPlayers[p.id] !== 'maybe')).length;
  return `<div class="tally">
    <span class="tally-pill tally-in">✓ ${inC} In</span>
    <span class="tally-pill tally-out">✗ ${outC} Out</span>
    <span class="tally-pill tally-maybe">~ ${mayC} Maybe</span>
    <span class="tally-pill tally-unk">? ${unkC} Unknown</span>
  </div>`;
}

function renderForm() {
  const card = document.getElementById('card');
  const opts = players.map(p => `<option value="${p.id}">${esc(p.name)} (${p.hcp >= 0 ? p.hcp : '+' + Math.abs(p.hcp)})</option>`).join('');

  card.innerHTML = `
    <div class="logo">Extras Manager</div>
    <div class="subtitle">Golf League RSVP</div>
    <div class="date-badge">${formatDate(dateStr)}</div>
    ${buildTally()}

    <label>Your Name</label>
    <select id="player-select" onchange="onPlayerChange()">
      <option value="">— Select your name —</option>
      ${opts}
    </select>

    <div id="rsvp-section" style="display:none">
      <div class="pizza-box" id="pizza-box">
        <div class="pizza-title">🍕 You Owe Pizza!</div>
        <div class="pizza-msg" id="pizza-msg"></div>
      </div>

      <label>Are you in?</label>
      <div class="btn-row">
        <button class="btn btn-in" id="btn-in" onclick="selectStatus('in')">✓ I'm In</button>
        <button class="btn btn-out" id="btn-out" onclick="selectStatus('out')">✗ Can't Make It</button>
        <button class="btn btn-maybe" id="btn-maybe" onclick="selectStatus('maybe')" style="flex:0.5">Maybe</button>
      </div>
      <div id="status-indicator" style="text-align:center;font-size:13px;font-weight:600;min-height:22px;margin-bottom:10px"></div>

      <div style="background:#f0f0ee;border-radius:10px;padding:14px;margin-bottom:16px">
        <div style="font-size:12px;font-weight:700;color:#4a6741;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Index Info</div>
        <div id="ghin-nudge" style="display:none;background:#78350f;border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:12px;color:#fcd34d;line-height:1.4">👋 We don't have your GHIN # on file — add it below so we can keep your index current!</div>
        <div class="hcp-row">
          <label>GHIN #</label>
          <input type="tel" id="ghin-input" placeholder="e.g. 11695577" inputmode="numeric">
        </div>
        <div class="hcp-row" style="margin-bottom:0">
          <label>Current Index</label>
          <input type="number" id="hcp-input" step="0.1" min="-10" max="54" placeholder="e.g. 14.2">
        </div>
      </div>

      <button class="btn-save" id="btn-save" onclick="submitRsvp()">Save My Response</button>
      <div class="status" id="status-msg"></div>
    </div>
    <div style="text-align:center;font-size:10px;color:#bbb;margin-top:16px;">RSVP v${RSVP_VERSION} · App v${new URLSearchParams(location.search).get('v')||'—'}</div>`;
}

function onPlayerChange() {
  const pid = document.getElementById('player-select').value;
  const section = document.getElementById('rsvp-section');
  if (!pid) { section.style.display = 'none'; return; }

  section.style.display = 'block';
  selectStatus('in'); // default to In

  // Pre-fill hcp and GHIN
  const p = players.find(pl => pl.id === pid);
  if (p) {
    document.getElementById('hcp-input').value = p.hcp;
    document.getElementById('ghin-input').value = p.ghin || '';
    const nudge = document.getElementById('ghin-nudge');
    if (nudge) nudge.style.display = (!p.ghin || !p.ghin.trim()) ? 'block' : 'none';
  }

  // Pizza check — find last evening's Game 1 winner
  const pizzaBox = document.getElementById('pizza-box');
  const pizzaMsg = document.getElementById('pizza-msg');
  if (pizzaBox && pizzaMsg) {
    try {
      const evenings = Array.isArray(state?.leagues?.[league]?.evenings)
        ? state.leagues[league].evenings : [];
      const lastEv = [...evenings].reverse().find(ev =>
        ev.games && ev.games.length && ev.games[0].saved && ev.games[0].winningTeamIdx != null
      );
      if (lastEv) {
        const g = lastEv.games[0];
        const winTeam = g.teams[g.winningTeamIdx];
        const onTeam = winTeam && winTeam.players && winTeam.players.some(tp => tp.id === pid);
        if (onTeam) {
          const teammates = winTeam.players.filter(tp => tp.id !== pid).map(tp => tp.name);
          const evDate = new Date(lastEv.date).toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'});
          const teamNote = teammates.length ? ' (with ' + teammates.join(', ') + ')' : '';
          pizzaMsg.textContent = 'Your team won Game 1 on ' + evDate + teamNote + '. Remember to bring pizza tonight — 7PM sharp!';
          pizzaBox.style.display = 'block';
        } else {
          pizzaBox.style.display = 'none';
        }
      } else {
        pizzaBox.style.display = 'none';
      }
    } catch(e) { pizzaBox.style.display = 'none'; }
  }
}

function resetButtons() {
  const btnIn  = document.getElementById('btn-in');
  const btnOut = document.getElementById('btn-out');
  if (btnIn)  { btnIn.className   = 'btn btn-in'; }
  if (btnOut) { btnOut.className  = 'btn btn-out'; }
  const btnMaybe = document.getElementById('btn-maybe');
  if (btnMaybe) btnMaybe.className = 'btn btn-maybe';
  // save button always visible
}

function selectStatus(status) {
  selectedStatus = status;
  const btnIn    = document.getElementById('btn-in');
  const btnOut   = document.getElementById('btn-out');
  const btnMaybe = document.getElementById('btn-maybe');
  const indic    = document.getElementById('status-indicator');
  btnIn.className    = status === 'in'    ? 'btn selected-in'    : 'btn btn-in';
  btnOut.className   = status === 'out'   ? 'btn selected-out'   : 'btn btn-out';
  btnMaybe.className = status === 'maybe' ? 'btn selected-maybe' : 'btn btn-maybe';
  if (indic) {
    const map = {
      in:    { text: '✓ Got it — see you on the course!', color: '#166534' },
      out:   { text: '✗ Got it — maybe next time!',       color: '#b91c1c' },
      maybe: { text: '~ OK — let us know if that changes!',    color: '#92400e' }
    };
    indic.textContent = map[status] ? map[status].text : '';
    indic.style.color = map[status] ? map[status].color : '#333';
  }
}

async function submitRsvp() {
  if (isExpired()) { showStatus('⏰ This link has expired.'); return; }

  const pid    = document.getElementById('player-select').value;
  const hcpVal = parseFloat(document.getElementById('hcp-input').value);
  if (!pid || !selectedStatus) return;

  const saveBtn = document.getElementById('btn-save');
  saveBtn.textContent = 'Saving…';
  saveBtn.disabled = true;

  try {
    // Read-modify-write the full state with writeKey included.
    // Firebase rules require the writeKey in the payload — partial PATCHes fail.
    const fresh = await fetchWT(`${FB_BASE}/state.json`);
    if (!fresh.ok) throw new Error('Could not read state');
    const fullState = await fresh.json();

    // Merge RSVP status
    if (!fullState.leagues) fullState.leagues = {};
    if (!fullState.leagues[league]) fullState.leagues[league] = {};
    const lg = fullState.leagues[league];
    if (!lg.rsvp) lg.rsvp = { date: dateStr, players: {}, sendTo: {} };
    if (!lg.rsvp.players) lg.rsvp.players = {};
    lg.rsvp.players[pid] = selectedStatus;

    // Merge handicap if changed
    if (!isNaN(hcpVal)) {
      const p = (lg.players || []).find(pl => pl.id === pid);
      if (p && hcpVal !== p.hcp) p.hcp = hcpVal;
    }

    // Merge GHIN if provided
    const ghinVal = (document.getElementById('ghin-input').value || '').trim().replace(/\D/g, '');
    if (ghinVal) {
      const p = (lg.players || []).find(pl => pl.id === pid);
      if (p && ghinVal !== p.ghin) p.ghin = ghinVal;
    }

    // PUT full state back — writeKey rides along so rules pass
    const resp = await fetchWT(`${FB_BASE}/state.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(fullState)
    });
    if (!resp.ok) {
      const txt = await resp.text();
      throw new Error('HTTP ' + resp.status + ': ' + txt.substring(0, 100));
    }

    // Update local state for tally display
    state = fullState;

    // Show success
    const card = document.getElementById('card');
    const name = players.find(p => p.id === pid)?.name || 'You';
    card.innerHTML = `
      <div class="logo">Extras Manager</div>
      <div class="date-badge">${formatDate(dateStr)}</div>
      ${buildTally()}
      <div class="success">
        <div class="success-icon">${selectedStatus === 'in' ? '⛳' : selectedStatus === 'maybe' ? '🤔' : '👋'}</div>
        <div class="success-msg">${selectedStatus === 'in' ? "You're In!" : selectedStatus === 'maybe' ? 'Maybe...' : 'Got it!'}</div>
        <div class="success-sub">${esc(name)}, your response has been saved.<br>${selectedStatus === 'in' ? 'See you on the course!' : selectedStatus === 'maybe' ? "Let us know if that changes!" : 'Maybe next time!'}</div>
      </div>`;

  } catch(e) {
    saveBtn.textContent = 'Save Response';
    saveBtn.disabled = false;
    showStatus('⚠ Could not save: ' + e.message);
  }
}

function showStatus(msg) {
  const el = document.getElementById('status-msg');
  if (el) { el.style.display = 'block'; el.textContent = msg; }
}

init();
</script>
</div><!-- /card-wrap -->
</body>
</html>
