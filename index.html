<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --g900:#0d1f0d;--g800:#1a2f1a;--g700:#243d24;--g600:#2e5230;
  --g500:#3a6b3c;--g400:#4e8a50;--g300:#72b074;--g200:#a8d4a9;
  --g100:#d4ead5;--g50:#f0f8f0;
  --gold:#c9a227;--gold-lt:#e8c04a;--gold-pale:#f9edcc;
  --surf:#fff;--surf2:#f4f4f2;--bdr:rgba(0,0,0,.10);
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;--red:#c0392b;
  --r:12px;--rsm:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available;font-family:'DM Sans',sans-serif;
     background:var(--surf2);color:var(--txt);max-width:430px;margin:0 auto;
     padding-top:env(safe-area-inset-top);
     overscroll-behavior:none;}

/* ── HEADER ── */
.hdr{background:var(--g800);padding:14px 18px 12px;display:flex;align-items:center;
     justify-content:space-between;position:sticky;top:0;z-index:100;
     box-shadow:0 2px 16px rgba(0,0,0,.35);flex-shrink:0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:2px}
.logo span{color:#fff}
.logo-sub{font-size:9px;color:var(--g200);letter-spacing:1.8px;text-transform:uppercase;margin-top:1px}
.hdr-right{text-align:right}
.hdr-ev{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--gold);letter-spacing:1px}
.hdr-gm{font-size:10px;color:var(--g200);letter-spacing:.5px;margin-top:1px}

/* ── SCREENS ── */
.screens{flex:1;overflow:hidden;position:relative}
.screen{display:none;position:absolute;inset:0;overflow-y:auto;padding:14px 14px 22px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.screen.active{display:block}

/* ── NAV ── */
.bnav{background:var(--g900);display:flex;flex-shrink:0;border-top:1px solid rgba(255,255,255,.07);
  padding-bottom:env(safe-area-inset-bottom)}
.nbtn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;
      align-items:center;gap:3px;padding:9px 4px 13px;color:var(--g300);transition:color .18s}
.nbtn.active{color:var(--gold)}
.nbtn svg{width:21px;height:21px;stroke-width:1.8}
.nlbl{font-size:10px;letter-spacing:.5px;font-weight:500}

/* ── TYPOGRAPHY ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--g700);letter-spacing:1px}
.sec-sub{font-size:12px;color:var(--txt3)}

/* ── BUTTONS ── */
.btn:active{opacity:.75;transform:scale(.96)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
     padding:10px 16px;border-radius:var(--rsm);font-family:'DM Sans',sans-serif;
     font-weight:500;font-size:14px;cursor:pointer;transition:all .14s;border:none;white-space:nowrap}
.btn-primary{background:var(--g600);color:#fff}
.btn-primary:active{background:var(--g700);transform:scale(.97)}
.btn-gold{background:var(--gold);color:var(--g900);font-weight:600}
.btn-gold:active{background:var(--gold-lt);transform:scale(.97)}
.btn-outline{background:transparent;border:1.5px solid var(--g500);color:var(--g600)}
.btn-outline:active{background:var(--g50)}
.btn-ghost{background:transparent;border:1.5px solid var(--bdr);color:var(--txt2)}
.btn-ghost:active{background:var(--surf2)}
.btn-danger{background:transparent;border:1.5px solid var(--red);color:var(--red)}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-xs{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-full{width:100%}

/* ── FORM ── */
.flbl{font-size:12px;color:var(--txt2);font-weight:500;letter-spacing:.3px;margin-bottom:4px;display:block}
input[type=text],input[type=number]{width:100%;padding:10px 12px;border:1.5px solid var(--bdr);
  border-radius:var(--rsm);font-family:'DM Sans',sans-serif;font-size:14px;
  background:var(--surf);color:var(--txt);outline:none;margin-bottom:11px;transition:border-color .14s}
input:focus{border-color:var(--g500)}

/* ── AVATAR ── */
.av{width:36px;height:36px;border-radius:50%;background:var(--g600);display:flex;
    align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;
    font-size:14px;color:#fff;flex-shrink:0}

/* ═══════════════════════════════════
   ROSTER SCREEN
═══════════════════════════════════ */
.roster-player{
  display:flex;align-items:center;gap:10px;
  padding:10px 13px;background:var(--surf);
  border-radius:var(--r);border:1.5px solid var(--bdr);
  margin-bottom:8px;cursor:pointer;transition:border-color .15s;
}
.roster-player:active{border-color:var(--g400)}
.rp-name{font-weight:500;font-size:15px}
.rp-sub{font-size:12px;color:var(--txt3);margin-top:1px}
.hcp-pill{margin-left:auto;background:var(--g100);color:var(--g700);
          font-weight:600;font-size:13px;padding:4px 10px;border-radius:20px;flex-shrink:0}

/* ═══════════════════════════════════
   EVENING / GAME SCREEN
═══════════════════════════════════ */

/* Evening banner at top of Play screen */
.ev-banner{background:var(--g800);border-radius:var(--r);padding:14px 16px;
           margin-bottom:14px;color:#fff}
.ev-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;
          color:var(--gold);line-height:1}
.ev-date{font-size:12px;color:var(--g100);margin-top:2px}
.ev-stats{display:flex;gap:18px;margin-top:10px}
.ev-stat-val{font-size:20px;font-weight:600;line-height:1}
.ev-stat-lbl{font-size:10px;color:var(--g200);margin-top:2px;letter-spacing:.5px}

/* Game tabs strip */
.game-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.game-tabs::-webkit-scrollbar{display:none}
.gtab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;
      cursor:pointer;border:1.5px solid var(--bdr);background:var(--surf);color:var(--txt2);
      transition:all .14s}
.gtab.active{background:var(--g700);color:#fff;border-color:var(--g700)}
.gtab.saved{background:var(--g100);color:var(--g700);border-color:var(--g200)}
.gtab-add{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;
          cursor:pointer;border:1.5px dashed var(--g400);background:transparent;
          color:var(--g500);transition:all .14s}
.gtab-add:active{background:var(--g50)}

/* Player selector for a game — two zones */
.player-selector{margin-bottom:14px}
.ps-zone-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
               color:var(--txt3);margin-bottom:6px;margin-top:10px}
.ps-zone-label:first-child{margin-top:0}

/* Each player chip in selector */
.ps-player{
  display:flex;align-items:center;gap:10px;
  padding:9px 13px;border-radius:var(--r);border:1.5px solid var(--bdr);
  background:var(--surf);margin-bottom:7px;cursor:pointer;
  transition:border-color .15s,background .15s;
}
.ps-player.in{
  border-color:var(--g500);background:var(--g50);
}
.ps-player.in .av{background:var(--g500)}
.ps-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--bdr);
          flex-shrink:0;margin-left:auto;display:flex;align-items:center;justify-content:center;
          transition:all .15s;font-size:12px;color:transparent}
.ps-player.in .ps-check{background:var(--g500);border-color:var(--g500);color:#fff}
.ps-name{font-weight:500;font-size:15px}
.ps-hcp{font-size:12px;color:var(--txt3);margin-top:1px}

/* Change indicator badges */
.change-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;
              flex-shrink:0;letter-spacing:.3px}
.badge-new{background:#e8f5e9;color:#2e7d32}
.badge-out{background:#fce4ec;color:#c62828}

/* Bottom action bar inside play screen */
.game-action-bar{
  background:var(--surf);border-radius:var(--r);
  border:1px solid var(--bdr);
  padding:14px;margin-top:8px;
}
.setup-btn{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:10px 8px;border-radius:var(--rsm);
  border:1.5px solid var(--g200);background:var(--g50);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  color:var(--g600);transition:all .15s;
}
.setup-btn.selected{border-color:var(--g600);background:var(--g700);color:#fff;font-weight:600;}
.setup-btn:active{transform:scale(.97);background:var(--g100);}

.standing-row{display:flex;align-items:center;gap:10px;padding:8px 12px;
  background:var(--surf);border-radius:var(--rsm);border:1px solid var(--bdr);margin-bottom:6px}
.standing-rank{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--g400);width:24px;text-align:center}
.standing-name{flex:1;font-weight:500;font-size:14px;color:var(--txt)}
.standing-wins{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--g600);letter-spacing:.5px}
.standing-wins-label{font-size:10px;color:var(--txt3);margin-top:-2px;text-align:right}
.hist-team-mini.winner{background:var(--gold-pale);border-color:var(--gold);border-width:2px}
.htm-winner-badge{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px;margin-left:6px}
.scard{border-radius:var(--r);border:2px solid var(--g200);background:var(--g50);
       padding:13px 15px;margin-bottom:10px}
.slabel{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;
        color:var(--g500);margin-bottom:5px}
.sval{font-size:17px;font-weight:600;color:var(--g800)}
.sdesc{font-size:12px;color:var(--txt2);margin-top:3px}

/* ── TEAM CARD ── */
.tcard{border-radius:var(--r);overflow:hidden;margin-bottom:11px;
       border:1px solid var(--bdr);background:var(--surf)}
.thdr{background:var(--g700);color:#fff;padding:9px 15px;
      display:flex;justify-content:space-between;align-items:center}
.tname{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px}
.tavg{font-size:12px;color:var(--g200)}
.tbody{padding:8px 15px}
.tplayer{display:flex;align-items:center;justify-content:space-between;
         padding:7px 0;border-bottom:1px solid var(--bdr);font-size:14px}
.tplayer:last-child{border-bottom:none}

/* ── INFO BOX ── */
.ibox{background:var(--gold-pale);border-radius:var(--rsm);padding:9px 13px;
      margin-bottom:10px;font-size:13px;color:#7a5900}

/* ── HISTORY ── */
.hist-ev{background:var(--surf);border-radius:var(--r);border:1px solid var(--bdr);
         margin-bottom:10px;overflow:hidden}
.hist-ev-hdr{padding:12px 15px;cursor:pointer;display:flex;align-items:center;gap:10px}
.hist-ev-hdr:active{background:var(--surf2)}
.hist-ev-title{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--g700);letter-spacing:1px}
.hist-ev-meta{font-size:12px;color:var(--txt3);margin-top:1px}
.hist-ev-chevron{margin-left:auto;color:var(--txt3);font-size:14px;transition:transform .2s}
.hist-ev.open .hist-ev-chevron{transform:rotate(180deg)}
.hist-ev-body{display:none;padding:0 15px 14px;border-top:1px solid var(--bdr)}
.hist-ev.open .hist-ev-body{display:block}
.hist-game{margin-top:12px}
.hist-game-title{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--g600);
                 letter-spacing:.8px;margin-bottom:6px}
.hist-srow{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.hist-chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;
           background:var(--g100);color:var(--g700)}
.hist-teams-mini{margin-top:8px}
.hist-team-mini{background:var(--g50);border-radius:var(--rsm);padding:8px 11px;
                margin-bottom:6px;border:1px solid var(--g200)}
.htm-name{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--g700);letter-spacing:.8px;margin-bottom:3px}
.htm-players{font-size:12px;color:var(--txt2);line-height:1.7}

/* ── MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;
           display:none;align-items:flex-end;justify-content:center}
.moverlay.open{display:flex}
.modal{background:var(--surf);border-radius:20px 20px 0 0;padding:20px 18px 30px;
       width:100%;max-width:430px;max-height:88vh;overflow-y:auto;animation:up .22s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--g700);
        letter-spacing:1px;margin-bottom:15px}
.mclose{float:right;margin-left:10px;background:var(--surf2);border:none;width:30px;
        height:30px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--txt2);
        display:flex;align-items:center;justify-content:center}
.mrow{display:flex;gap:8px;margin-top:4px}

/* ── EMPTY ── */
.empty{text-align:center;padding:44px 20px;color:var(--txt3)}
.eico{font-size:42px;margin-bottom:10px}
.emsg{font-size:15px;font-weight:500;color:var(--txt2);margin-bottom:5px}
.esub{font-size:13px}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--bdr);margin:10px 0}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
       background:var(--g800);color:#fff;padding:9px 20px;border-radius:24px;
       font-size:13px;font-weight:500;z-index:300;opacity:0;pointer-events:none;
       transition:opacity .25s;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>

<script>
// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
const STORE = 'gl_v4';
const OLD_KEYS = ['gl_v3', 'gl_v2', 'golfleague_v2', 'golfleague_v3'];

// ── Firebase config ────────────────────────────────────────
const FB_BASE = 'https://extras-manager-default-rtdb.firebaseio.com';
const FB_URL  = FB_BASE + '/state.json';
let _fbSaveTimer = null;
let _fbStream    = null;
let _lastWriteTs = 0;  // track our own writes so we don't re-render on echo

function setSyncStatus(msg, color) {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = '⬤ ' + msg; el.style.color = color || 'var(--g300)'; }
}

async function fbWrite(data) {
  setSyncStatus('saving…', 'var(--gold)');
  try {
    _lastWriteTs = Date.now();
    const r = await fetch(FB_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    setSyncStatus(r.ok ? 'synced' : 'error', r.ok ? '#86efac' : '#f87171');
  } catch(e) { setSyncStatus('offline', '#f87171'); }
}

// Firebase drops empty arrays — normalize state after every remote read
function normalizeState(raw) {
  const s = raw || {};
  s.players  = Array.isArray(s.players)  ? s.players  : (s.players  ? Object.values(s.players)  : []);
  s.evenings = Array.isArray(s.evenings) ? s.evenings : (s.evenings ? Object.values(s.evenings) : []);
  s.seasons  = Array.isArray(s.seasons)  ? s.seasons  : (s.seasons  ? Object.values(s.seasons)  : []);
  s.evCount  = s.evCount  || 0;
  if (s.activeEvening) {
    s.activeEvening.games = Array.isArray(s.activeEvening.games)
      ? s.activeEvening.games
      : (s.activeEvening.games ? Object.values(s.activeEvening.games) : []);
    s.activeEvening.games.forEach(g => {
      if (g.teams) {
        g.teams = Array.isArray(g.teams) ? g.teams : Object.values(g.teams);
        g.teams.forEach(t => {
          t.players = Array.isArray(t.players) ? t.players : Object.values(t.players || {});
        });
      }
      g.playerIds = Array.isArray(g.playerIds) ? g.playerIds
        : (g.playerIds ? Object.values(g.playerIds) : []);
    });
  }
  return s;
}

// Don't overwrite local state if user is actively setting up a game
function isBusy() {
  const ev = S.activeEvening;
  if (!ev || !ev.games) return false;
  const game = ev.games[activeGameIdx];
  if (!game) return false;
  // Busy if: team size selected but teams not yet generated, or game is in play mode
  return (game.pendingSize && !game.teams) || (game.teams && !game.saved);
}

function fbStream() {
  // Close any existing stream
  if (_fbStream) { try { _fbStream.close(); } catch(e) {} }

  setSyncStatus('connecting…', 'var(--gold)');
  try {
    _fbStream = new EventSource(FB_BASE + '/state.json?stream=true&accept=text/event-stream');

    _fbStream.addEventListener('put', e => {
      try {
        const msg = JSON.parse(e.data);
        // Accept root path or any data that looks like our state
        const remote = (msg.path === '/' || msg.path === '') ? msg.data : null;
        if (!remote) { setSyncStatus('live', '#86efac'); return; }
        if (!remote.players) { setSyncStatus('live', '#86efac'); return; }

        // Skip if this is an echo of our own write (within 3 seconds)
        if (Date.now() - _lastWriteTs < 3000) { setSyncStatus('synced', '#86efac'); return; }

        // Don't overwrite if user is actively generating teams
        if (isBusy()) { setSyncStatus('live', '#86efac'); return; }

        S = normalizeState(remote);
        try { localStorage.setItem(STORE, JSON.stringify(S)); } catch(e) {}
        syncAndRenderAll();
        setSyncStatus('live', '#86efac');
      } catch(err) { setSyncStatus('live', '#86efac'); }
    });

    _fbStream.addEventListener('patch', e => {
      // Partial update — just do a full re-read to keep it simple
      clearTimeout(_fbSaveTimer);
      _fbSaveTimer = setTimeout(async () => {
        try {
          const r = await fetch(FB_URL);
          if (!r.ok) return;
          const remote = await r.json();
          if (!remote || !remote.players) return;
          if (Date.now() - _lastWriteTs < 3000) return;
          if (isBusy()) return;
          S = normalizeState(remote);
          try { localStorage.setItem(STORE, JSON.stringify(S)); } catch(e) {}
          syncAndRenderAll();
        } catch(e) {}
      }, 500);
    });

    _fbStream.onerror = () => {
      setSyncStatus('reconnecting…', '#f87171');
      // EventSource auto-reconnects; update status when it does
      setTimeout(() => {
        if (_fbStream.readyState === EventSource.OPEN) setSyncStatus('live', '#86efac');
      }, 3000);
    };

    _fbStream.onopen = () => setSyncStatus('live', '#86efac');

  } catch(e) {
    // EventSource not supported — fall back to polling
    setSyncStatus('polling', 'var(--g300)');
    setInterval(async () => {
      try {
        const r = await fetch(FB_URL);
        if (!r.ok) return;
        const remote = await r.json();
        if (!remote || !remote.players) return;
        if (Date.now() - _lastWriteTs < 3000) return;
        if (isBusy()) return;
        S = normalizeState(remote);
        try { localStorage.setItem(STORE, JSON.stringify(S)); } catch(e) {}
        syncAndRenderAll();
      } catch(e) {}
    }, 5000);
  }
}

function load() {
  try {
    const r = localStorage.getItem(STORE);
    if (r) return JSON.parse(r);
    for (const key of OLD_KEYS) {
      const old = localStorage.getItem(key);
      if (old) {
        const parsed = JSON.parse(old);
        if (parsed && parsed.players && parsed.players.length) {
          return { players: parsed.players, evenings: [], evCount: 0, activeEvening: null, seasons: parsed.seasons || [] };
        }
      }
    }
  } catch(e) {}
  return { players: [], evenings: [], evCount: 0, activeEvening: null, seasons: [] };
}

function save() {
  try { localStorage.setItem(STORE, JSON.stringify(S)); } catch(e) {}
  clearTimeout(_fbSaveTimer);
  _fbSaveTimer = setTimeout(() => fbWrite(S), 800);
}

let S = load();

// Start streaming on load; reconnect when app comes to foreground
window.addEventListener('load', () => {
  fbStream();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      // Reconnect stream if it closed while backgrounded
      if (!_fbStream || _fbStream.readyState === EventSource.CLOSED) fbStream();
    }
  });
});

// ── A/B/C/D TIER — dynamic per game group ─────────────────
// Tiers are assigned by ranking players in the CURRENT game
// by handicap and splitting into quarters. No fixed cutoffs —
// the best player tonight is always A, the highest is always D.
//
// tierMap is rebuilt each time teams are generated and used for
// display throughout the UI.
let _tierMap = new Map(); // pid -> 'A'|'B'|'C'|'D'

function buildTierMap(players) {
  // players = full roster; we only tier the ones playing tonight
  const sorted = [...players].sort((a, b) => a.hcp - b.hcp);
  const n = sorted.length;
  _tierMap = new Map();
  sorted.forEach((p, i) => {
    const pct = i / n;           // 0 = lowest hcp, 1 = highest
    let t;
    if      (pct < 0.25) t = 'A';
    else if (pct < 0.50) t = 'B';
    else if (pct < 0.75) t = 'C';
    else                 t = 'D';
    _tierMap.set(p.id, t);
  });
}

// Fallback for roster display (not in a game context) — use hcp ranges
function tier(hcp) {
  if (hcp <= 5)  return 'A';
  if (hcp <= 10) return 'B';
  if (hcp <= 16) return 'C';
  return 'D';
}
// Get tier for a player — uses dynamic map if available, else static
function playerTier(p) {
  return _tierMap.has(p.id) ? _tierMap.get(p.id) : tier(p.hcp);
}

function tierColor(t) {
  if (t === 'A') return 'var(--gold)';
  if (t === 'B') return 'var(--g300)';
  if (t === 'C') return '#a78bfa';
  return '#f87171';
}
function tierBg(t) {
  if (t === 'A') return 'var(--g800)';
  if (t === 'B') return 'var(--g700)';
  if (t === 'C') return '#3b1f6e';
  return '#7f1d1d';
}

// ── PAIRING HISTORY ───────────────────────────────────────
// Returns set of "id1|id2" pairs from the last N saved games
const PAIR_MEMORY = 4;
function recentPairs() {
  const pairs = new Map(); // key -> count of times paired recently
  const allGames = [];
  S.evenings.forEach(ev => ev.games.filter(g=>g.saved).forEach(g => allGames.push(g)));
  if (S.activeEvening) S.activeEvening.games.filter(g=>g.saved).forEach(g => allGames.push(g));
  const recent = allGames.slice(-PAIR_MEMORY);
  recent.forEach((g, gi) => {
    const weight = gi + 1; // more recent = higher weight
    g.teams.forEach(t => {
      const ids = t.players.map(p => p.id);
      for (let i = 0; i < ids.length; i++)
        for (let j = i+1; j < ids.length; j++) {
          const k = [ids[i],ids[j]].sort().join('|');
          pairs.set(k, (pairs.get(k)||0) + weight);
        }
    });
  });
  return pairs;
}

function renderRoster() {
  const el = document.getElementById('roster-rows');
  if (!el) return;
  const sorted = [...S.players].sort((a, b) => a.name.localeCompare(b.name));
  if (!sorted.length) {
    el.innerHTML = `<div style="font-size:13px;color:var(--txt3);padding:12px 2px">No players yet. Tap "+ Add Player" to begin.</div>`;
    return;
  }
  el.innerHTML = sorted.map(p => {
    const t = playerTier(p);
    return `<div id="row-${p.id}" style="display:grid;grid-template-columns:1fr 72px 36px;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid var(--bdr)">
      <input type="text" value="${x(p.name)}"
        style="font-size:14px;font-family:'DM Sans',sans-serif;border:none;border-bottom:1px solid transparent;background:transparent;padding:4px 2px;width:100%;color:var(--txt)"
        onchange="rosterUpdateName('${p.id}', this.value)"
        onfocus="this.style.borderBottomColor='var(--gold)'"
        onblur="this.style.borderBottomColor='transparent'">
      <input type="number" value="${p.hcp}" step="0.1" min="-10" max="54"
        style="font-size:14px;font-family:'DM Sans',sans-serif;border:none;border-bottom:1px solid transparent;background:transparent;padding:4px 2px;width:100%;text-align:center;color:var(--txt)"
        onchange="rosterUpdateHcp('${p.id}', this.value)"
        onfocus="this.style.borderBottomColor='var(--gold)'"
        onblur="this.style.borderBottomColor='transparent'">
      <button onclick="rosterDeletePlayer('${p.id}')"
        style="background:none;border:none;cursor:pointer;font-size:16px;color:#f87171;padding:4px;line-height:1">✕</button>
    </div>`;
  }).join('');
}

function rosterUpdateName(pid, val) {
  val = val.trim();
  if (!val) { toast('Name cannot be empty'); renderRoster(); return; }
  const p = S.players.find(p => p.id === pid);
  if (p) { p.name = val; save(); }
}

function rosterUpdateHcp(pid, val) {
  const hcp = parseFloat(val);
  if (isNaN(hcp) || hcp < -10 || hcp > 54) { toast('Handicap must be −10 to 54'); renderRoster(); return; }
  const p = S.players.find(p => p.id === pid);
  if (p) { p.hcp = hcp; save(); }
}

function rosterAddRow() {
  // Add a blank player, render, then focus the new name field
  const id = uid();
  S.players.push({ id, name: '', hcp: 0 });
  save();
  renderRoster();
  const newInput = document.querySelector(`#row-${id} input[type="text"]`);
  if (newInput) { newInput.focus(); newInput.style.borderBottomColor = 'var(--gold)'; }
}

function rosterDeletePlayer(pid) {
  // Use the m-winner modal for confirm
  const p = S.players.find(p => p.id === pid);
  if (!p) return;
  const nameEl = document.getElementById('winner-team-name');
  const playersEl = document.getElementById('winner-team-players');
  const btn = document.getElementById('winner-confirm-btn');
  nameEl.textContent = 'Remove ' + p.name + '?';
  playersEl.innerHTML = '<div style="font-size:13px;color:var(--txt2);margin-top:4px">This cannot be undone.</div>';
  btn.textContent = 'Remove';
  btn.style.background = '#ef4444';
  btn.style.display = '';
  btn.onclick = () => {
    S.players = S.players.filter(pl => pl.id !== pid);
    save();
    closeM('m-winner');
    btn.style.background = '';
    btn.textContent = 'Confirm ✓';
    btn.onclick = null;
    renderRoster();
    toast('Player removed');
  };
  openM('m-winner');
}

function syncAndRenderAll() {
  // Normalize activeEvening — ensure games array always exists
  if (S.activeEvening) {
    if (!S.activeEvening.games) S.activeEvening.games = [];
    if (S.activeEvening.games.length > 0) {
      activeGameIdx = S.activeEvening.games.length - 1;
    } else {
      activeGameIdx = 0;
    }
  } else {
    activeGameIdx = 0;
  }
  renderAll();
}

function renderAll() {
  renderPlayScreen();
  renderRoster();
  renderHistory();
  renderSettings();
}

function updateHeader() {
  const ev = S.activeEvening;
  if (!ev) {
    // No active evening — show current season if one matches today
    const season = detectSeason();
    document.getElementById('hdr-ev').textContent = season ? season.year + ' ' + season.name : '—';

  } else {
    const d = new Date(ev.date).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
    document.getElementById('hdr-ev').textContent = d;
    const g = ev.games[activeGameIdx];
    document.getElementById('hdr-gm').textContent = g ? 'Game ' + g.gameNum : ev.season || '';
  }
}

// ── Main Home render ───────────────────────────────────
function renderHome() {
  const ev = S.activeEvening;
  if (!ev) return;

  // ── Previous games summary ─────────────────────────
  const savedGames = ev.games.filter(g => g.saved);
  const allGames = ev.games;
  const summaryEl = document.getElementById('prev-games-summary');
  if (allGames.length > 0) {
    summaryEl.innerHTML = `
      <div style="padding:10px 0 4px">
        <div style="font-size:10px;font-weight:600;letter-spacing:1px;color:var(--txt3);margin-bottom:8px;text-transform:uppercase">This Evening</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${allGames.map(g => {
            const winner = g.winningTeamIdx != null ? g.teams[g.winningTeamIdx] : null;
            const winnerNames = winner ? winner.players.map(p => p.name.split(' ')[0]).join(' · ') : null;
            const status = winner ? '🏆 ' + winnerNames : g.saved ? 'No winner yet' : 'In progress';
            return `<div style="background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rsm);padding:6px 10px;font-size:12px">
              <div style="display:flex;align-items:center;gap:8px">
                <div>
                  <div style="font-weight:600;color:var(--g600)">Game ${g.gameNum}</div>
                  <div style="color:var(--txt2);margin-top:1px">${status}</div>
                </div>
                <button onclick="deleteActiveGame(${g.gameNum})"
                  style="font-size:11px;color:#f87171;background:none;border:none;cursor:pointer;padding:2px 4px;line-height:1">✕</button>
              </div>
            </div>`;
          }).join('')}
        </div>
        <div style="margin-top:10px;border-top:1px solid var(--bdr)"></div>
      </div>`;
  } else {
    summaryEl.innerHTML = '';
  }

  // ── Current game ───────────────────────────────────
  const game = ev.games[activeGameIdx];
  if (!game) {
    document.getElementById('game-content').innerHTML = '';
  } else {
    renderGameContent(game, ev);
  }

  // ── Footer actions ─────────────────────────────────
  const footerEl = document.getElementById('evening-footer');
  const gameInPlay = game && game.saved && game.winningTeamIdx == null; // awaiting winner
  const winnerRecorded = game && game.saved && game.winningTeamIdx != null;

  if (gameInPlay) {
    footerEl.innerHTML = ''; // focused winner-picking — no footer
  } else {
    footerEl.innerHTML = `
      <div style="display:flex;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--bdr)">
        <button class="btn btn-ghost btn-full" onclick="endEvening()" style="color:var(--txt3);font-size:13px">End Evening</button>
        ${winnerRecorded || !game ? `<button class="btn btn-primary btn-full" onclick="promptAddGame()" style="font-size:13px">+ New Game</button>` : ''}
      </div>`;
  }

  updateHeader();
}

// ── Alias for renderHome so existing calls still work ──
function renderEvening() { renderHome(); }
function confirmStartEvening() {
  // Auto-detect season from today's date
  const detected = detectSeason();
  const fullSeason = detected ? (detected.year + ' ' + detected.name) : null;

  if (S.activeEvening) archiveEvening();
  S.evCount++;
  S.activeEvening = {
    evNum       : S.evCount,
    date        : new Date().toISOString(),
    season      : fullSeason,
    defaultBuyIn: 20,
    games       : []
  };
  activeGameIdx = 0;
  save();
  closeM('m-evening');
  addGame();
  if (!fullSeason) toast('No matching season found — evening saved without season');
}

// ── Archive active evening to history ─────────────────
function archiveEvening() {
  if (!S.activeEvening) return;
  S.evenings.push({ ...S.activeEvening });
  S.activeEvening = null;
  save();
}

// ── Add a new game tab ─────────────────────────────────
function addGame() {
  const ev = S.activeEvening;
  if (!ev) return;
  const gameNum = ev.games.length + 1;

  // Default player list: copy last game's lineup, or empty if first
  let defaultPids = [];
  if (ev.games.length > 0) {
    defaultPids = [...ev.games[ev.games.length - 1].playerIds];
  }

  ev.games.push({
    gameNum,
    playerIds: defaultPids,
    teams: null,
    s1: null, s2: null, course: null,
    teamSize: null, teamCount: null,
    buyIn: ev.defaultBuyIn || 20,
    saved: false
  });
  activeGameIdx = ev.games.length - 1;
  save();
  renderEvening();
}

function promptAddGame() {
  const ev = S.activeEvening;
  if (!ev) { toast('Start an evening first'); return; }
  addGame();
}

// ── Render content for a specific game ────────────────
function renderGameContent(game, ev) {
  const el = document.getElementById('game-content');

  // If teams already generated & saved — show read-only result
  if (game.saved) {
    el.innerHTML = renderGameResult(game, true);
    return;
  }

  // If teams generated but not saved — show result with save option
  if (game.teams) {
    el.innerHTML = renderGameResult(game, false);
    return;
  }

  // Otherwise — show player selector
  el.innerHTML = renderPlayerSelector(game, ev);
}

// ── Player selector ────────────────────────────────────
function renderPlayerSelector(game, ev) {
  if (!S.players.length) {
    return `<div class="empty"><div class="eico">👥</div><div class="emsg">Add players to your roster first</div></div>`;
  }

  // Build dynamic tier map from tonight's active players
  const activePlayers = S.players.filter(p => game.playerIds.includes(p.id));
  if (activePlayers.length > 0) buildTierMap(activePlayers);

  const prevPids = ev.games.length > 1 && activeGameIdx > 0
    ? ev.games[activeGameIdx - 1].playerIds
    : null;

  const sorted = [...S.players].sort((a,b) => a.name.localeCompare(b.name));
  const inSet  = new Set(game.playerIds);
  const n = game.playerIds.length;
  const allSelected = sorted.length > 0 && sorted.every(p => inSet.has(p.id));

  const renderPlayer = (p) => {
    const inGame = inSet.has(p.id);

// Result format draw — rules based on team count
// 2 teams  → always Play Better Golf
// 3 teams  → Two Tie All Tie or Play Better Golf (no Three Tie)
// 4+ teams → any format
function drawS1(numTeams) {
  if (numTeams <= 2) return S1.find(s => s.label === 'Play Better Golf');
  if (numTeams === 3) {
    const pool = S1.filter(s => s.label !== 'Three Tie, All Tie');
    return pool[rnd(pool.length)];
  }
  return S1[rnd(S1.length)];
}

const GAME_FMTS = ['Alternate Shot', 'Scramble'];

function generateGame() {
  const game = S.activeEvening && S.activeEvening.games[activeGameIdx];
  if (!game) { toast('ERR: no game'); return; }
  if (game.playerIds.length < 2) { toast('Need at least 2 players'); return; }
  const sz = game.pendingSize;
  if (!sz) { toast('ERR: no size — pick a team size'); return; }
  if (sz === 2 && game.playerIds.length % 2 !== 0) {
    toast(`Can't do 2-man with ${game.playerIds.length} players — need an even number`);
    return;
  }
  const players = S.players.filter(p => game.playerIds.includes(p.id));
  const numT    = Math.ceil(players.length / sz);
  game.teams     = makeTeams(players, sz);
  game.course    = null;
  game.s1        = drawS1(numT);
  game.gameFmt   = sz === 2 ? (Math.random() < 0.5 ? 'Alternate Shot' : 'Scramble') : (Math.random() < 0.5 ? 'Scramble' : 'Shamble');
  game.s2        = null;
  game.teamSize  = sz;
  game.teamCount = numT;
  save();
  renderEvening();
  toast(`⛳ ${game.gameFmt} · 🎲 ${game.s1.label}`);
}

function reshuffleGame() {
  const game = S.activeEvening.games[activeGameIdx];
  if (!game || game.saved) return;
  const players = S.players.filter(p => game.playerIds.includes(p.id));
  game.teams   = makeTeams(players, game.teamSize);
  game.s1      = drawS1(game.teamCount);
  game.gameFmt = game.teamSize === 2 ? (Math.random() < 0.5 ? 'Alternate Shot' : 'Scramble') : (Math.random() < 0.5 ? 'Scramble' : 'Shamble');
  save();
  renderEvening();
  toast(`⛳ ${game.gameFmt} · 🎲 ${game.s1.label}`);
}

// ══════════════════════════════════════════════════════════
// GAME RULES
// ══════════════════════════════════════════════════════════
const S1 = [
  { label: 'Two Tie, All Tie',   desc: 'If any 2 players on the team score the same on a hole, all teammates tie.' },
  { label: 'Three Tie, All Tie', desc: 'If any 3 players on the team score the same on a hole, all teammates tie.' },
  { label: 'Play Better Golf',   desc: 'Play Better Golf format.' }
];



// Course type now chosen by user in the UI before generating

// Team config: prefer equal teams of 4→3→2
// Team config: always aim for an even number of teams (2 simulators).
// Course drives preferred team size:
//   Par 3 → prefer 2-man teams (smaller, faster)
//   Par 4 → prefer 3 or 4-man teams
// Among options with the right size preference, always pick even team count first.
// teamCfg returns:
//   sz    = display label (max team size)
//   ct    = number of teams
//   maxSz = size of the larger teams
//   minSz = size of the smaller teams (may equal maxSz if perfectly even)
//   bigCt = how many teams get maxSz (rest get minSz)
// Rule: uneven splits are fine (differ by 1). The team containing the
//   lowest-handicap player always gets the SMALLER size as a built-in advantage.
function teamCfg(n, course) {
  if (n < 2) return { sz: 0, ct: 0, maxSz: 0, minSz: 0, bigCt: 0 };

  const par3 = course === 'Par 3';

  // Par 3: strictly 2-man teams only, always even count
  if (par3) {
    const ct = Math.floor(n / 2);          // pairs; odd player sits out or plays 3
    const bigCt = n % 2;                   // 1 if odd number of players
    const maxSz = bigCt ? 3 : 2;           // one 3-man if odd, else all 2-man
    const minSz = 2;
    return { sz: maxSz, ct: bigCt ? ct : ct, maxSz, minSz, bigCt, even: ct % 2 === 0 };
  }

  // Par 4: prefer 4-man then 3-man; 2-man only for very small groups (<6 players)
  const minTeamSz = n < 6 ? 2 : 3;
  const sizeOrder = [4, 3, 2];
  const options = [];
  for (let ct = 2; ct <= Math.min(n, 8); ct++) {
    const maxSz = Math.ceil(n / ct);
    const minSz = Math.floor(n / ct);
    if (maxSz > 4 || minSz < minTeamSz) continue;
    if (maxSz - minSz > 1) continue;
    const bigCt = n - minSz * ct;
    const even  = ct % 2 === 0;
    const prefIdx = sizeOrder.indexOf(maxSz) >= 0 ? sizeOrder.indexOf(maxSz) : sizeOrder.indexOf(minSz);
    options.push({ sz: maxSz, ct, maxSz, minSz, bigCt, even, prefIdx: prefIdx >= 0 ? prefIdx : 99 });
  }

  if (!options.length) return { sz: n, ct: 1, maxSz: n, minSz: n, bigCt: 0 };

  const even = options.filter(o => o.even);
  const pool = even.length ? even : options;
  pool.sort((a, b) => a.prefIdx - b.prefIdx || b.maxSz - a.maxSz);
  return pool[0];
}

// Team generation: dynamic tiers + optimal balance + pairing variety.
//
// Step 0 — Build dynamic A/B/C/D tier map from tonight's players
//   (rank-split into quarters). A players must be paired with C or D
//   players whenever possible — enforced as a validity constraint.
//
// Step 1 — Exhaustive backtracking finds ALL valid, balanced assignments:
//   - Valid = every A player is on a team with at least one C or D player
//     (unless no C/D players exist in the group, in which case relaxed)
//   - Balanced = minimum spread (max_avg - min_avg) across teams
//   - Symmetry break: skip teams with identical (count, hcpSum)
//
// Step 2 — Among tied-best solutions, pick the one with fewest recent
//   pairings (last 4 games, weighted by recency). Random among final ties.
function makeTeams(players, sz) {
  const n      = players.length;
  const numT   = Math.ceil(n / sz);
  const nShort = numT * sz - n;   // how many teams are short-handed

  const pairHistory = recentPairs();

  // ── Skill cohorts ───────────────────────────────────────
  // Sort by handicap ascending (best = lowest index first)
  const byHcp = [...players].sort((a, b) => a.hcp - b.hcp);

  // Each cohort has exactly numT players (one per team per slot).
  // Birdie = best numT players (slot A)
  // Bogey  = worst numT players (slot D/C/B depending on sz)
  // Par    = everyone in between (fills middle slots)
  const Birdie = byHcp.slice(0, numT);
  const Bogey  = byHcp.slice(n - numT);
  const Par    = byHcp.slice(numT, n - numT);

  // Update tier map for badge display
  // 2-man: A+B slots only; 3-man: A+B+C slots; 4-man: A+B+C+D
  _tierMap = new Map();
  Birdie.forEach(p => _tierMap.set(p.id, 'A'));
  Bogey.forEach(p  => _tierMap.set(p.id, sz === 2 ? 'B' : sz === 3 ? 'C' : 'D'));
  // Par split: first half = B (better, dealt 3rd), second half = C (worse, dealt 4th)
  // Short-handed teams skip slot C (last round), so they get A+B+D
  // B = lower hcp Par players (indices 0..numT-1 of Par sorted asc)
  // C = higher hcp Par players (indices numT.. of Par sorted asc)
  const parSortedForLabel = [...Par].sort((a, b) => a.hcp - b.hcp);
  parSortedForLabel.forEach((p, i) => _tierMap.set(p.id, sz === 3 ? 'B' : i < numT ? 'B' : 'C'));

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ── Slot assignment ─────────────────────────────────────
  // Team slots (one per team, dealt straight across):
  //   2-man: [slot-A=Birdie] [slot-B=Bogey]
  //   3-man: [slot-A=Birdie] [slot-B=Bogey] [slot-C=Par]
  //   4-man: [slot-A=Birdie] [slot-B=Bogey] [slot-C=Par-high] [slot-D=Par-low]
  //
  // Short-handed teams get nShort blanks inserted at the START of the Par
  // slot round — those teams simply don't receive a Par player.
  // Birdie always pairs with Bogey. Par fills the extra slots on full teams.
  //
  // Birdie: dealt in strict handicap order (best first, no shuffle).
  // Bogey:  shuffled for variety.
  // Par:    assigned to minimise avg handicap spread across full teams.

  function buildTeams() {
    const nFull = numT - nShort;

    // Slot deal order:
    // A (Birdie): descending index (best first), strict — no rotation
    // All other slots (Bogey, ParB, ParC): ascending index (worst first),
    //   with 3-spot rotation within bands for week-to-week variety

    function rotate3(arr) {
      const out = [];
      for (let i = 0; i < arr.length; i += 3) {
        const band = arr.slice(i, i + 3);
        const rot  = Math.floor(Math.random() * band.length);
        for (let j = 0; j < band.length; j++) out.push(band[(j + rot) % band.length]);
      }
      return out;
    }

    // A: Birdie best→worst (already sorted, no rotation)
    const birdiePool = [...Birdie]; // descending index

    // Bogey: rotate full pool by a random offset so any Bogey can pair with any Birdie
    const bogeyDesc   = [...Bogey].reverse(); // worst→best
    const bogeyOffset = Math.floor(Math.random() * bogeyDesc.length);
    const bogeyPool   = bogeyDesc.map((_, i) => bogeyDesc[(i + bogeyOffset) % bogeyDesc.length]);

    // Par split: ParB = better half, ParC = worse half
    const parSorted = [...Par].sort((a, b) => a.hcp - b.hcp);
    const parMid    = Math.ceil(parSorted.length / 2);
    const ParB      = parSorted.slice(0, parMid);   // better Par (slot B/C)
    const ParC      = parSorted.slice(parMid);       // worse Par  (slot C/D)

    // ParB worst→best then 3-spot rotation (fills slot C in 4-man, slot B in 3-man)
    const parBPool = (() => { const a=[...ParB].reverse(), o=Math.floor(Math.random()*a.length); return a.map((_,i)=>a[(i+o)%a.length]); })();
    // ParC worst→best then 3-spot rotation (fills slot D in 4-man)
    const parCPool = (() => { const a=[...ParC].reverse(), o=Math.floor(Math.random()*a.length); return a.map((_,i)=>a[(i+o)%a.length]); })();

    // Build rounds — each round deals straight across teams 0..numT-1
    // null = blank (short-handed team skips this slot)
    let rounds;
    if (sz === 2) {
      // Round 1: A (numT items), Round 2: B=Bogey (numT items)
      rounds = [birdiePool.slice(0, numT), bogeyPool.slice(0, numT)];
    } else if (sz === 3) {
      // Round 1: A, Round 2: C=Bogey, Round 3: B=Par (full Par pool, nShort blanks first)
      const parAllPool = (() => { const a=[...Par].sort((a,b)=>a.hcp-b.hcp).reverse(), o=Math.floor(Math.random()*a.length); return a.map((_,i)=>a[(i+o)%a.length]); })();
      const round3 = [...Array(nShort).fill(null), ...parAllPool.slice(0, nFull)];
      rounds = [birdiePool.slice(0, numT), bogeyPool.slice(0, numT), round3];
    } else {
      // 4-man: Round 1: A, Round 2: D=Bogey, Round 3: C=ParB, Round 4: B=ParC
      // Deal order: A (best→worst), D=Bogey (worst→best), B=better Par, C=worse Par
      // Short-handed teams get A+D+B (3 players), skip slot C (last round)
      const roundA = birdiePool.slice(0, numT);
      const roundD = bogeyPool.slice(0, numT);
      const parAsc = [...Par].sort((a, b) => a.hcp - b.hcp); // best Par first (lowest hcp)
      // B slot: first numT Par players (better = lower hcp) → all teams
      const parForB = (() => { const a=[...parAsc.slice(0,numT)].reverse(), o=Math.floor(Math.random()*a.length); return a.map((_,i)=>a[(i+o)%a.length]); })();
      // C slot: remaining Par players (worse = higher hcp) → full teams only, short skip
      const parForC = (() => { const a=[...parAsc.slice(numT)].reverse(), o=Math.floor(Math.random()*a.length); return a.map((_,i)=>a[(i+o)%a.length]); })().slice(0,nFull);
      const roundB  = parForB.slice(0, numT);
      const roundC  = [...Array(nShort).fill(null), ...parForC];
      rounds = [roundA, roundD, roundB, roundC];
    }

    const teams = Array.from({length: numT}, () => []);
    for (const pool of rounds) {
      for (let slot = 0; slot < numT && slot < pool.length; slot++) {
        if (pool[slot] !== null) teams[slot].push(pool[slot]);
      }
    }
    return teams;
  }

  // Run 10 trials (Bogey shuffled each time), pick best avg balance
  let bestTeams = null, bestScore = Infinity;
  for (let trial = 0; trial < 10; trial++) {
    const teams = buildTeams();
    // Score: avg handicap spread across ALL teams (lower = better balance)
    const avgs = teams.map(t => t.reduce((s, p) => s + p.hcp, 0) / t.length);
    let score = Math.max(...avgs) - Math.min(...avgs);
    // Also penalise recent pairings
    teams.forEach(team => {
      for (let i = 0; i < team.length; i++)
        for (let j = i + 1; j < team.length; j++) {
          const k = [team[i].id, team[j].id].sort().join('|');
          score += (pairHistory.get(k) || 0) * 0.5;
        }
    });
    if (score < bestScore) { bestScore = score; bestTeams = teams.map(t => [...t]); }
  }

  const teamArrays = bestTeams || Array.from({length: numT}, () => []);

  // Sort players within each team by tier: A first, then B, C, D
  const tierOrder = { A: 0, B: 1, C: 2, D: 3 };
  teamArrays.forEach(t => {
    t.sort((a, b) => (tierOrder[a.tierLabel || _tierMap.get(a.id)] ?? 9) - (tierOrder[b.tierLabel || _tierMap.get(b.id)] ?? 9));
  });

  const maxSz = Math.max(...teamArrays.map(t => t.length));
  const minSz = Math.min(...teamArrays.map(t => t.length));

  return teamArrays.map((members, i) => ({
    name    : 'Team ' + (i + 1),
    players : members.map(p => ({ ...p, tierLabel: _tierMap.get(p.id) || playerTier(p) })),
    avgHcp  : members.reduce((s, p) => s + p.hcp, 0) / members.length,
    teamNote: maxSz > minSz ? (members.length === minSz ? 'short' : null) : null
  }));
}

function renderSettings() {
  const el = document.getElementById('seasons-list');
  if (!el) return;
  const seasons = S.seasons || [];
  if (!seasons.length) {
    el.innerHTML = `<div style="font-size:13px;color:var(--txt3);padding:12px 0">No seasons defined yet. Add one to enable automatic season tracking.</div>`;
    return;
  }
  el.innerHTML = seasons.map((s, i) => `
    <div class="roster-player" style="margin-bottom:8px">
      <div>
        <div style="font-weight:600;font-size:15px">${x(s.year + ' ' + s.name)}</div>
        <div style="font-size:12px;color:var(--txt3);margin-top:2px">${fmtDate(s.start)} → ${fmtDate(s.end)}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="openEditSeason(${i})">Edit</button>
        <button class="btn btn-ghost btn-sm" style="color:#f87171" onclick="deleteSeason(${i})">✕</button>
      </div>
    </div>`).join('');
}

function fmtDate(d) {
  if (!d) return '?';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function openAddSeason() {
  document.getElementById('sm-title').textContent = 'Add Season';
  document.getElementById('sm-name').value  = '';
  document.getElementById('sm-year').value  = new Date().getFullYear();
  document.getElementById('sm-start').value = '';
  document.getElementById('sm-end').value   = '';
  document.getElementById('sm-edit-id').value = '';
  ['fall','winter','spring'].forEach(s => {
    const b = document.getElementById('sn-' + s);
    if (b) b.classList.remove('selected');
  });
  openM('m-season');
}

function openEditSeason(idx) {
  const s = (S.seasons || [])[idx];
  if (!s) return;
  document.getElementById('sm-title').textContent = 'Edit Season';
  document.getElementById('sm-name').value  = s.name;
  document.getElementById('sm-year').value  = s.year;
  document.getElementById('sm-start').value = s.start;
  document.getElementById('sm-end').value   = s.end;
  document.getElementById('sm-edit-id').value = idx;
  ['fall','winter','spring'].forEach(n => {
    const b = document.getElementById('sn-' + n);
    if (b) b.classList.toggle('selected', n === s.name.toLowerCase());
  });
  openM('m-season');
}

function pickSeasonName(val) {
  document.getElementById('sm-name').value = val;
  ['fall','winter','spring'].forEach(s => {
    const b = document.getElementById('sn-' + s);
    if (b) b.classList.toggle('selected', s === val.toLowerCase());
  });
}

function saveSeason() {
  const name  = document.getElementById('sm-name').value;
  const year  = parseInt(document.getElementById('sm-year').value);
  const start = document.getElementById('sm-start').value;
  const end   = document.getElementById('sm-end').value;
  const editId = document.getElementById('sm-edit-id').value;

  if (!name)  { toast('Pick a season name'); return; }
  if (!year)  { toast('Enter a year'); return; }
  if (!start) { toast('Enter a start date'); return; }
  if (!end)   { toast('Enter an end date'); return; }
  if (start >= end) { toast('End date must be after start date'); return; }

  if (!S.seasons) S.seasons = [];

  // Check for overlaps (excluding the one being edited)
  const conflict = S.seasons.find((s, i) => {
    if (editId !== '' && i === parseInt(editId)) return false;
    return start < s.end && end > s.start;
  });
  if (conflict) { toast(`Overlaps with ${conflict.year} ${conflict.name}`); return; }

  const entry = { name, year, start, end };
  if (editId !== '') {
    S.seasons[parseInt(editId)] = entry;
  } else {
    S.seasons.push(entry);
  }
  S.seasons.sort((a, b) => a.start.localeCompare(b.start));

  save();
  closeM('m-season');
  renderSettings();
  toast('Season saved');
}

function deleteSeason(idx) {
  if (!S.seasons) return;
  S.seasons.splice(idx, 1);
  save();
  renderSettings();
}

function assignSeasonToEvening(evNum) {
  let ev = S.activeEvening && S.activeEvening.evNum === evNum ? S.activeEvening : null;
  if (!ev) ev = S.evenings.find(e => e.evNum === evNum);
  if (!ev) return;
  // Try to detect season based on evening's own date
  const evDate = new Date(ev.date).toISOString().slice(0, 10);
  const seasons = S.seasons || [];
  const match = seasons.find(s => evDate >= s.start && evDate <= s.end);
  if (match) {
    ev.season = match.year + ' ' + match.name;
    save();
    renderHistory();
    toast('Season assigned: ' + ev.season);
  } else {
    toast('No season covers ' + fmtDate(evDate));
  }
}

// Auto-detect season from today's date
function detectSeason() {
  const today = new Date().toISOString().slice(0, 10);
  const seasons = S.seasons || [];
  return seasons.find(s => today >= s.start && today <= s.end) || null;
}

let _seasonFilter = 'All';

function openEveningModal() {
  const detected = detectSeason();
  const el = document.getElementById('m-evening-season');
  if (el) {
    el.innerHTML = detected
      ? `Season: <strong>${detected.year} ${detected.name}</strong>`
      : `<span style="color:#f87171">No active season defined — evening will be saved without a season.<br>Add seasons in the Settings tab.</span>`;
  }
  openM('m-evening');
}

function pickYear(val) {
  document.getElementById('year-pick').value = val;
  const thisYear = new Date().getFullYear();
  [thisYear - 1, thisYear, thisYear + 1].forEach(y => {
    const b = document.getElementById('yr-' + y);
    if (b) b.classList.toggle('selected', y === val);
  });
  updateSeasonPreview();
}

function pickSeason(val) {
  document.getElementById('season-pick').value = val;
  ['fall','winter','spring'].forEach(s => {
    const b = document.getElementById('szn-' + s);
    if (b) b.classList.toggle('selected', s === val.toLowerCase());
  });
  updateSeasonPreview();
}

function updateSeasonPreview() {
  const year   = document.getElementById('year-pick')   ? document.getElementById('year-pick').value   : '';
  const season = document.getElementById('season-pick') ? document.getElementById('season-pick').value : '';
  const el = document.getElementById('season-preview');
  if (el) el.textContent = (year && season) ? year + ' ' + season : '';
}

function setSeasonFilter(val) {
  _seasonFilter = val;
  ['all','fall','winter','spring'].forEach(s => {
    const b = document.getElementById('flt-' + s);
    if (b) b.classList.toggle('selected', s === val.toLowerCase());
  });
  renderStandings();
}

function renderStandings() {
  const el = document.getElementById('standings-list');
  if (!el) return;

  // Collect all saved games across evenings
  const allEvenings = [...S.evenings];
  if (S.activeEvening) allEvenings.push(S.activeEvening);

  // Build win counts AND $ stats per player
  const stats = {};
  allEvenings.forEach(ev => {
    const season = ev.season || 'Unknown';
    if (_seasonFilter !== 'All' && !(season && season.toLowerCase().includes(_seasonFilter.toLowerCase()))) return;
    ev.games.filter(g => g.saved).forEach(g => {
      const buyIn  = g.buyIn || 20;
      const pot    = g.pot || (buyIn * g.playerIds.length);
      const nWinners = g.winningTeamIdx != null && g.teams
        ? g.teams[g.winningTeamIdx].players.length : 0;
      const share  = nWinners ? pot / nWinners : 0;

      // All participating players paid the buy-in
      g.playerIds.forEach(pid => {
        if (!stats[pid]) {
          const p = S.players.find(pl => pl.id === pid);
          stats[pid] = { name: p ? p.name : pid, wins: 0, grossWon: 0, paid: 0 };
        }
        stats[pid].paid += buyIn;
      });

      // Winning team gets their share
      if (g.winningTeamIdx != null && g.teams) {
        const wt = g.teams[g.winningTeamIdx];
        if (wt) wt.players.forEach(p => {
          if (!stats[p.id]) stats[p.id] = { name: p.name, wins: 0, grossWon: 0, paid: 0 };
          stats[p.id].wins++;
          stats[p.id].grossWon += share;
        });
      }
    });
  });

  const sorted = Object.values(stats).sort((a, b) => b.wins - a.wins);

  if (!sorted.length) {
    el.innerHTML = `<div style="font-size:13px;color:var(--txt3);padding:10px 0">No wins recorded yet${_seasonFilter !== 'All' ? ' for ' + _seasonFilter : ''}</div>`;
    return;
  }

  // Win standings
  const winRows = sorted.map((p, i) => `
    <div class="standing-row">
      <div class="standing-rank">${i + 1}</div>
      <div class="standing-name">${x(p.name)}</div>
      <div style="text-align:right">
        <div class="standing-wins">${p.wins}</div>
        <div class="standing-wins-label">WIN${p.wins !== 1 ? 'S' : ''}</div>
      </div>
    </div>`).join('');

  // $ standings — sorted by net
  const dollarSorted = [...Object.values(stats)].sort((a, b) => (b.grossWon - b.paid) - (a.grossWon - a.paid));
  const dollarRows = dollarSorted.map(p => {
    const net = p.grossWon - p.paid;
    const netColor = net >= 0 ? '#166534' : '#991b1b';
    const netBg    = net >= 0 ? '#dcfce7'  : '#fee2e2';
    return `<div style="display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--bdr);gap:6px">
      <div style="flex:1;font-size:14px;font-weight:500">${x(p.name)}</div>
      <div style="text-align:right;font-size:12px;color:var(--txt3);min-width:54px">$${p.grossWon.toFixed(0)}<br><span style="font-size:10px">gross</span></div>
      <div style="text-align:right;font-size:12px;color:var(--txt3);min-width:46px">$${p.paid.toFixed(0)}<br><span style="font-size:10px">paid</span></div>
      <div style="text-align:right;font-size:13px;font-weight:700;padding:3px 8px;border-radius:20px;background:${netBg};color:${netColor};min-width:52px">${net >= 0 ? '+' : ''}$${net.toFixed(0)}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    ${winRows}
    <div style="margin-top:16px;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--g700);letter-spacing:1px;padding:0 2px 6px">
      💰 Money Standings
    </div>
    <div style="background:var(--surf);border-radius:var(--rsm);border:1px solid var(--bdr);overflow:hidden">
      <div style="display:flex;padding:6px 12px;background:var(--surf2);font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:.5px;gap:6px">
        <div style="flex:1">PLAYER</div>
        <div style="min-width:54px;text-align:right">GROSS</div>
        <div style="min-width:46px;text-align:right">PAID</div>
        <div style="min-width:52px;text-align:right">NET</div>
      </div>
      ${dollarRows}
    </div>`;
}

function setWinner(evNum, gameNum, teamIdx) {
  // Find the game in active or archived evenings
  let ev = S.activeEvening && S.activeEvening.evNum === evNum ? S.activeEvening : null;
  if (!ev) ev = S.evenings.find(e => e.evNum === evNum);
  if (!ev) return;
  const game = ev.games.find(g => g.gameNum === gameNum);
  if (!game || !game.saved) return;

  // Toggle: tap same team again to clear winner
  game.winningTeamIdx = game.winningTeamIdx === teamIdx ? null : teamIdx;
  save();
  renderHistory();
  renderStandings();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  const allEvenings = [...S.evenings];
  if (S.activeEvening && S.activeEvening.games.some(g => g.saved)) {
    allEvenings.push({ ...S.activeEvening, _active: true });
  }
  document.getElementById('hist-ct').textContent = allEvenings.length + ' evening' + (allEvenings.length !== 1 ? 's' : '');

  renderStandings();

  // Set default season filter button
  const fltAll = document.getElementById('flt-all');
  if (fltAll && !fltAll.classList.contains('selected') &&
      !document.querySelector('[id^="flt-"].selected')) {
    fltAll.classList.add('selected');
  }

  if (!allEvenings.length) {
    el.innerHTML = `<div class="empty"><div class="eico">📋</div><div class="emsg">No history yet</div><div class="esub">Completed evenings will appear here</div></div>`;
    return;
  }

  el.innerHTML = [...allEvenings].reverse().map(ev => {
    const d = new Date(ev.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const savedGames = ev.games.filter(g => g.saved);
    const label = ev._active ? 'Evening ' + ev.evNum + ' (Active)' : 'Evening ' + ev.evNum;
    const seasonBadge = ev.season
      ? `<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--g100);color:var(--g600);margin-left:6px">${ev.season}</span>`
      : `<span onclick="assignSeasonToEvening(${ev.evNum})" style="font-size:10px;padding:2px 7px;border-radius:10px;background:#fee2e2;color:#ef4444;margin-left:6px;cursor:pointer">No season — tap to assign</span>`;
    return `<div class="hist-ev" id="hev-${ev.evNum}">
      <div class="hist-ev-hdr" onclick="toggleHistEv(${ev.evNum})">
        <div style="flex:1;min-width:0">
          <div class="hist-ev-title">${label}${seasonBadge}</div>
          <div class="hist-ev-meta">${d} · ${savedGames.length} game${savedGames.length!==1?'s':''}</div>
        </div>
        ${!ev._active ? `<button onclick="event.stopPropagation();deleteEvening(${ev.evNum})"
          style="font-size:11px;color:#f87171;background:none;border:none;cursor:pointer;padding:4px 6px;flex-shrink:0">✕ Delete</button>` : ''}
        <div class="hist-ev-chevron">▾</div>
      </div>
      <div class="hist-ev-body">
        ${savedGames.map(g => renderHistGame(g, ev.evNum)).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleHistEv(evNum) {
  document.getElementById('hev-' + evNum).classList.toggle('open');
}

function deleteEvening(evNum) {
  const ev = S.evenings.find(e => e.evNum === evNum);
  if (!ev) return;
  const d = new Date(ev.date).toLocaleDateString('en-US', {month:'short', day:'numeric'});
  const games = ev.games.filter(g => g.saved).length;
  // Use a simple confirm — no confirm() on Android, so use our modal approach
  const modal = document.getElementById('m-winner');
  document.getElementById('winner-team-name').textContent = 'Delete Evening?';
  document.getElementById('winner-team-players').innerHTML =
    `<div style="font-size:13px;color:var(--txt2);margin-bottom:4px">${d} · ${games} game${games!==1?'s':''}</div>
     <div style="font-size:12px;color:#f87171">This cannot be undone.</div>`;
  document.getElementById('winner-confirm-btn').textContent = 'Delete';
  document.getElementById('winner-confirm-btn').style.background = '#ef4444';
  document.getElementById('winner-confirm-btn').style.display = '';
  document.getElementById('winner-confirm-btn').onclick = () => {
    S.evenings = S.evenings.filter(e => e.evNum !== evNum);
    save();
    closeM('m-winner');
    // Reset button appearance
    document.getElementById('winner-confirm-btn').textContent = 'Confirm ✓';
    document.getElementById('winner-confirm-btn').style.background = '';
    document.getElementById('winner-confirm-btn').onclick = null;
    renderHistory();
    toast('Evening deleted');
  };
  openM('m-winner');
}

function renderHistGame(g, evNum) {
  const buyIn   = g.buyIn || 20;
  const pot     = g.pot   || (buyIn * g.playerIds.length);
  const share   = g.winShare || (g.winningTeamIdx != null && g.teams
    ? pot / g.teams[g.winningTeamIdx].players.length : null);
  const isPizzaGame = g.gameNum === 1;
  const winnerName  = g.winningTeamIdx != null && g.teams
    ? g.teams[g.winningTeamIdx].players.map(p => x(p.name)).join(', ') : null;

  return `<div class="hist-game">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="hist-game-title" style="margin-bottom:0">Game ${g.gameNum} &nbsp;·&nbsp; ${g.playerIds.length} players &nbsp;·&nbsp; ${g.teamCount} teams of ${g.teamSize}</div>
      <button onclick="deleteGame(${evNum}, ${g.gameNum})"
        style="font-size:11px;color:#f87171;background:none;border:none;cursor:pointer;padding:4px 6px;flex-shrink:0">✕ Delete</button>
    </div>
    <div class="hist-srow" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px">
      ${g.s1 ? `<span class="hist-chip">${x(g.s1.label)}</span>` : ''}
      ${g.gameFmt ? `<span class="hist-chip" style="background:var(--g100);color:var(--g700)">${x(g.gameFmt)}</span>` : ''}
      <span class="hist-chip" style="background:var(--gold-pale);color:var(--g800)">$${buyIn} buy-in · $${pot} pot</span>
      ${share != null ? `<span class="hist-chip" style="background:#dcfce7;color:#166534">$${share.toFixed(0)}/winner</span>` : ''}
      ${isPizzaGame && winnerName ? `<span class="hist-chip" style="background:#fff7ed;color:#9a3412" title="Game 1 winner buys pizza next week">🍕 ${winnerName} buys pizza</span>` : ''}
    </div>
    <div style="font-size:11px;color:var(--txt3);margin-bottom:6px">Tap a team to mark winner</div>
    <div class="hist-teams-mini">
      ${g.teams.map((t, ti) => {
        const isWinner = g.winningTeamIdx === ti;
        return `<div class="hist-team-mini${isWinner ? ' winner' : ''}"
          onclick="setWinner(${evNum}, ${g.gameNum}, ${ti})"
          style="cursor:pointer">
          <div class="htm-name">${x(t.name)}
            <span style="font-weight:400;font-size:11px;color:var(--g500)">Avg ${fmtHcp(t.avgHcp)}</span>
            ${isWinner ? '<span class="htm-winner-badge">🏆 WINNER</span>' : ''}
          </div>
          <div class="htm-players">${t.players.map(p => x(p.name) + ' (' + fmtHcp(p.hcp) + ')').join(' · ')}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function deleteActiveGame(gameNum) {
  const ev = S.activeEvening;
  if (!ev) return;
  const game = ev.games.find(g => g.gameNum === gameNum);
  if (!game) return;

  const modal = document.getElementById('m-winner');
  document.getElementById('winner-team-name').textContent = 'Delete Game ' + gameNum + '?';
  const desc = game.teamCount
    ? `${game.playerIds.length} players · ${game.teamCount} teams of ${game.teamSize}`
    : `${game.playerIds.length} players · not yet generated`;
  document.getElementById('winner-team-players').innerHTML =
    `<div style="font-size:13px;color:var(--txt2);margin-bottom:4px">${desc}</div>
     <div style="font-size:12px;color:#f87171">This cannot be undone.</div>`;
  document.getElementById('winner-confirm-btn').textContent = 'Delete';
  document.getElementById('winner-confirm-btn').style.background = '#ef4444';
  document.getElementById('winner-confirm-btn').style.display = '';
  document.getElementById('winner-confirm-btn').onclick = () => {
    ev.games = ev.games.filter(g => g.gameNum !== gameNum);
    if (activeGameIdx >= ev.games.length) activeGameIdx = Math.max(0, ev.games.length - 1);
    save();
    closeM('m-winner');
    document.getElementById('winner-confirm-btn').textContent = 'Confirm ✓';
    document.getElementById('winner-confirm-btn').style.background = '';
    document.getElementById('winner-confirm-btn').onclick = null;
    renderEvening();
    toast('Game ' + gameNum + ' deleted');
  };
  openM('m-winner');
}

function openM(id)  { document.getElementById(id).classList.add('open'); }
function closeM(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.moverlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); })
);

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2600);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function rnd(n) { return Math.floor(Math.random() * n); }
function fmtHcp(h) {
  const n = +h;
  if (n < 0) return '+' + Math.abs(n).toFixed(1);
  return n.toFixed(1);
}
function x(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
